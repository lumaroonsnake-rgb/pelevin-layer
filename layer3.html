<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Слой №3</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#000;
    color:#eee;

    font-family:Consolas, monospace;

    text-align:center;

    overflow-x:hidden;

}



/* ОСНОВА */

.container{

    padding:15px;

    transition:1s;

}



h1{

    font-size:30px;

    letter-spacing:5px;

    margin-bottom:15px;

    font-weight:400;

}



.intro{

    color:#aaa;

    line-height:1.6;

    margin-bottom:15px;

    font-size:15px;

}




/* КАРТИНКА */

.picture{

    position:relative;

    width:100%;

    max-width:1054px;

    max-height:70vh;

    margin:auto;

}



.picture img{

    width:100%;

    height:auto;

    max-height:70vh;

    object-fit:contain;

    display:block;

}



/* ЗОНЫ ОБЪЕКТОВ */

.hotspot{

    position:absolute;

    cursor:pointer;

}



/* ЛИСА */

.fox{

    left:2.18%;
    top:14.14%;

    width:36.05%;
    height:50.27%;

}



/* КОСМОНАВТ */

.astronaut{

    left:70.87%;
    top:10.52%;

    width:26.57%;
    height:41.55%;

}



/* ВЕРСИЯ ЧЕЛОВЕКА */

.digital{

    left:35.29%;
    top:14.34%;

    width:37.95%;
    height:54.96%;

}



/* ОПЕРАТОР */

.operator{

    left:5.03%;
    top:65.48%;

    width:22.77%;
    height:21.45%;

}



/* ЧЕРЕП */

.skull{

    left:37.57%;
    top:68.36%;

    width:24.67%;
    height:22.79%;

}



/* TRANSHUMANISM */

.trans{

    left:22.01%;
    top:85.12%;

    width:16.13%;
    height:11.39%;

}



/* IPHUCK */

.rabbit{

    left:77.89%;
    top:52.68%;

    width:17.08%;
    height:26.81%;

}



/* КНИГА */

.book{

    left:68.88%;
    top:77.21%;

    width:17.08%;
    height:22.79%;

}



/* ЗАТЕМНЕНИЕ */

.overlay{

    display:none;

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.75);

    z-index:10;

}



.overlay.active{

    display:block;

}





/* ОКНО ПАМЯТИ */

.message{

    opacity:0;

    pointer-events:none;

    position:fixed;

    left:50%;

    top:50%;

    transform:translate(-50%,-50%) scale(.96);


    background:#050505;

    border:1px solid #555;

    width:90%;

    max-width:520px;

    padding:22px;

    z-index:20;


    transition:.5s;


    box-shadow:

    0 0 25px rgba(255,255,255,.08);

}



.message.active{

    opacity:1;

    pointer-events:auto;

    transform:translate(-50%,-50%) scale(1);

}



.message::before{

    content:"";

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:2px;

    background:#777;

    animation:scan 2s infinite;

}



@keyframes scan{

0%{

opacity:.2;

}


50%{

opacity:1;

}


100%{

opacity:.2;

}

}



.message h2{

    font-size:20px;

    letter-spacing:3px;

    line-height:1.4;

}



.archive{

    margin:15px 0;

    padding:10px;

    border-top:1px solid #333;

    border-bottom:1px solid #333;

    text-align:left;

    font-size:11px;

    color:#888;

    letter-spacing:2px;

}



.message p{

    font-size:14px;

    line-height:1.6;

    color:#ccc;

    max-height:50vh;

    overflow-y:auto;

}



.close{

    margin-top:20px;

    color:#aaa;

    cursor:pointer;

    letter-spacing:2px;

}


/* ФИНАЛЬНЫЙ ЭКРАН */


#ending{

    display:none;

    position:fixed;

    inset:0;

    background:#000;

    z-index:100;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    color:#aaa;

    letter-spacing:3px;

    line-height:2;

    font-size:14px;

    padding:30px;

    text-align:center;

}



#ending.show{

    display:flex;

}
