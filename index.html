<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Второй слой</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#000;
    color:#eee;
    font-family:Consolas, monospace;
    overflow:hidden;

}


/* ЗАГРУЗКА */

#boot{

    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    flex-direction:column;

    background:#000;

}



h1{

    font-size:38px;
    letter-spacing:6px;
    margin-bottom:40px;
    font-weight:400;

}



.bar{

    width:320px;
    height:8px;

    background:#222;

    border-radius:5px;

    overflow:hidden;

}



.progress{

    height:100%;
    width:0%;

    background:#fff;

    animation:load 4s forwards;

}



@keyframes load{

from{
    width:0%;
}

to{
    width:100%;
}

}



#percent{

    margin-top:20px;

    color:#777;

}




/* ОСНОВНАЯ СТРАНИЦА */


#main{

    display:none;

    height:100vh;
    width:100vw;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:30px;

}



#title{

    font-size:40px;

    letter-spacing:4px;

    margin-bottom:30px;

}



#text{

    max-width:650px;

    color:#aaa;

    line-height:1.9;

    margin-bottom:35px;

    font-size:18px;

}



img{

    max-width:420px;

    width:85%;

    border-radius:10px;

}




/* КНОПКА СЛОЙ 3 */


.layer-button{

    margin-top:35px;

    color:#aaa;

    text-decoration:none;

    letter-spacing:4px;

    font-size:16px;


    border:1px solid #333;

    padding:14px 30px;


    transition:0.4s;


}



.layer-button:hover{

    color:#fff;

    border-color:#777;

}



</style>


</head>



<body>



<!-- ЗАГРУЗКА -->


<div id="boot">


<h1>
ИНИЦИАЛИЗАЦИЯ
</h1>


<div class="bar">

<div class="progress"></div>

</div>



<div id="percent">

Проверка второго слоя...

</div>



</div>





<!-- ОСНОВНАЯ СТРАНИЦА -->


<div id="main">



<div id="title">

ДОСТУП РАЗРЕШЁН

</div>




<div id="text">


Ты видишь изображение.

<br><br>

Но изображение —
это только поверхность.

<br><br>

Некоторые объекты
содержат больше информации,
чем кажется.


</div>




<img src="print.jpg">





<a href="layer3.html" class="layer-button">

СЛОЙ №3 ДОСТУПЕН

</a>




</div>






<script>


setTimeout(function(){


document.getElementById("boot").style.display="none";


document.getElementById("main").style.display="flex";


document.body.style.overflow="auto";


},4000);



</script>




</body>

</html>
