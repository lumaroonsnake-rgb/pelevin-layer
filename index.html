<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Второй слой</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#000;
    color:#eee;
    font-family:Consolas, monospace;
    overflow:hidden;

}


/* ЗАГРУЗКА */


#boot{

    position:fixed;
    inset:0;

    display:flex;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    background:#000;

}



h1{

    font-size:32px;
    letter-spacing:5px;
    margin-bottom:30px;
    font-weight:400;

}



.bar{

    width:260px;
    height:7px;

    background:#222;

    border-radius:5px;

    overflow:hidden;

}



.progress{

    height:100%;
    width:0%;

    background:#fff;

    animation:load 4s forwards;

}



@keyframes load{

from{

    width:0%;

}

to{

    width:100%;

}

}



#percent{

    margin-top:18px;

    color:#777;

    font-size:13px;

}



/* ОСНОВНАЯ СТРАНИЦА */


#main{

    display:none;

    min-height:100vh;

    width:100vw;


    justify-content:center;

    align-items:center;


    flex-direction:column;


    text-align:center;


    padding:20px;

}




#title{

    font-size:32px;

    letter-spacing:3px;

    margin-bottom:20px;

}




#text{

    max-width:360px;

    color:#aaa;

    line-height:1.5;

    margin-bottom:25px;

    font-size:16px;

}




img{

    max-width:360px;

    width:85%;


    border-radius:0;

    box-shadow:none;


    transition:0.5s;

}




img:hover{

    transform:scale(1.03);

}




/* КНОПКА СЛОЙ №2 */


.small{

    margin-top:20px;

    color:#888;

    font-size:12px;

    letter-spacing:3px;

    text-decoration:none;

    border:1px solid #333;

    padding:10px 25px;

    transition:0.3s;

}



.small:hover{

    color:#fff;

    border-color:#777;

}



</style>


</head>


<body>



<div id="boot">


<h1>ИНИЦИАЛИЗАЦИЯ</h1>


<div class="bar">

<div class="progress"></div>

</div>


<div id="percent">

Проверка второго слоя...

</div>


</div>





<div id="main">



<div id="title">

ДОСТУП РАЗРЕШЁН

</div>




<div id="text">


Ты увидел рисунок.

<br><br>

Но некоторые изображения существуют сразу в двух слоях.

<br><br>

Перед тобой первый.

<br>

Второй начинается здесь.


</div>




<img src="print.jpg">





<a href="layer2.html" class="small">

СЛОЙ №2

</a>




</div>






<script>


setTimeout(function(){


document.getElementById("boot").style.display="none";


document.getElementById("main").style.display="flex";


document.body.style.overflow="auto";


},4000);



</script>



</body>

</html>
