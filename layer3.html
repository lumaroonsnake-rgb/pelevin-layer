<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Слой №3</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#000;
    color:#eee;

    font-family:Consolas, monospace;

    text-align:center;

}



.container{

    padding:30px 15px;

}



h1{

    font-size:34px;
    letter-spacing:5px;

    margin-bottom:25px;

    font-weight:400;

}



.intro{

    color:#aaa;

    line-height:1.8;

    margin-bottom:30px;

}



/* КАРТИНКА */

.picture{

    position:relative;

    width:100%;

    max-width:1054px;

    margin:auto;

}



.picture img{

    width:100%;

    height:auto;

    display:block;

}



/* НЕВИДИМЫЕ ЗОНЫ */

.hotspot{

    position:absolute;

    cursor:pointer;

}



/* ЛИСА */

.fox{

    left:2.18%;
    top:14.14%;

    width:36.05%;
    height:50.27%;

}



/* КОСМОНАВТ */

.astronaut{

    left:70.87%;
    top:10.52%;

    width:26.57%;
    height:41.55%;

}



/* ВЕРСИЯ ЧЕЛОВЕКА */

.digital{

    left:35.29%;
    top:14.34%;

    width:37.95%;
    height:54.96%;

}



/* ОПЕРАТОР */

.operator{

    left:5.03%;
    top:65.48%;

    width:22.77%;
    height:21.45%;

}



/* ЧЕРЕП */

.skull{

    left:37.57%;
    top:68.36%;

    width:24.67%;
    height:22.79%;

}



/* TRANSHUMANISM */

.trans{

    left:22.01%;
    top:85.12%;

    width:16.13%;
    height:11.39%;

}



/* IPHUCK 10 */

.rabbit{

    left:77.89%;
    top:52.68%;

    width:17.08%;
    height:26.81%;

}



/* КНИГА */

.book{

    left:68.88%;
    top:77.21%;

    width:17.08%;
    height:22.79%;

}




/* ЗАТЕМНЕНИЕ */

.overlay{

    display:none;

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.75);

    z-index:10;

}



.overlay.active{

    display:block;

}



/* ОКНО ДОСТУПА */

.message{

    opacity:0;

    pointer-events:none;

    position:fixed;

    left:50%;

    top:50%;

    transform:translate(-50%,-50%) scale(0.96);


    background:#050505;

    border:1px solid #555;


    width:90%;

    max-width:520px;


    padding:30px;


    z-index:20;


    transition:

    opacity .5s ease,

    transform .5s ease;


    box-shadow:

    0 0 25px rgba(255,255,255,0.08);

}



.message.active{

    opacity:1;

    pointer-events:auto;

    transform:translate(-50%,-50%) scale(1);

}



.message::before{

    content:"";

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:2px;

    background:#777;


    animation:scan 2s infinite;

}



@keyframes scan{

    0%{

        opacity:.2;

    }


    50%{

        opacity:1;

    }


    100%{

        opacity:.2;

    }

}



.message h2{

    font-size:22px;

    letter-spacing:3px;

    line-height:1.5;

}



.archive{

    margin:20px 0;

    padding:12px;

    border-top:1px solid #333;

    border-bottom:1px solid #333;

    text-align:left;

    font-size:12px;

    color:#888;

    letter-spacing:2px;

}



.message p{

    font-size:15px;

    line-height:1.7;

    color:#ccc;

    max-height:60vh;

    overflow-y:auto;

}



.close{

    margin-top:25px;

    color:#aaa;

    cursor:pointer;

    letter-spacing:2px;

}


</style>

</head>

    <body>


<div class="container">


<h1>
СЛОЙ №3
</h1>



<div class="intro">

НЕ ВСЁ, ЧТО ТЫ ВИДИШЬ,<br>
ЯВЛЯЕТСЯ ПРОСТО РИСУНКОМ.<br><br>

КОСНИСЬ ОДНОГО ИЗ ОБЪЕКТОВ.<br><br>

ОН ГОТОВ ГОВОРИТЬ.

</div>



<div class="picture">


<img src="print.jpg">



<div class="hotspot fox"
onclick="openObject('ОБЪЕКТ №01<br>ЛИСА',
'Красота не принадлежит женщине и не является ее собственным свойством – просто в определенную пору жизни ее лицо отражает красоту, как оконное стекло – невидимое за крышами домов солнце... Но солнце, как известно, вовсе не в стеклах, на которые мы смотрим. Оно в нас.')">
</div>



<div class="hotspot astronaut"
onclick="openObject('ОБЪЕКТ №02<br>КОСМОНАВТ',
'История человечества... это история массовых дезинформаций. И не потому, что люди глупые и их легко обмануть. Люди умны и проницательны. Но они с удовольствием поверят в самую гнусную ложь, если в результате им устроят хорошую жизнь.')">
</div>



<div class="hotspot digital"
onclick="openObject('ОБЪЕКТ №03<br>ВЕРСИЯ ЧЕЛОВЕКА',
'Дисциплина — это порядок. Порядок создает ритм, а ритм рождает свободу. Без дисциплины нет свободы. Беспорядок — это хаос. Хаос — это рабство.')">
</div>



<div class="hotspot operator"
onclick="openObject('ОБЪЕКТ №04<br>ОПЕРАТОР РЕАЛЬНОСТИ',
'Люди умны и проницательны. Но они с удовольствием поверят в самую гнусную ложь, если в результате им устроят хорошую жизнь.')">
</div>



<div class="hotspot skull"
onclick="openObject('ОБЪЕКТ №05<br>ЧЕРЕП',
'Мы любим вовсе не тех, кто сделал нам что-то хорошее. Мы любим тех, кому сделали что-то хорошее мы сами.')">
</div>



<div class="hotspot trans"
onclick="openObject('ОБЪЕКТ №06<br>TRANSHUMANISM',
'Человеку труднее всего расстаться не с воспоминаниями, а с привычкой вспоминать.')">
</div>



<div class="hotspot rabbit"
onclick="openObject('ОБЪЕКТ №07<br>iPhuck 10',
'Любой человек инсталлирует скачанные из сети программы на свой девайс с большой осторожностью. А их ведь можно стереть. В крайнем случае можно выбросить девайс и купить новый. Но на главный диск у себя в голове, который не поменять до смерти, человек доверчиво ставит что попало. Немедленно и с песнями выжигает в нейронах на все свое короткое «всегда».')">
</div>



<div class="hotspot book"
onclick="openObject('АРТЕФАКТ №08<br>ЧАПАЕВ И ПУСТОТА',
'Поскольку бытие вещей заключается в их воспринимаемости, любая трансформация может происходить двумя путями – быть либо восприятием трансформации, либо трансформацией восприятия.')">
</div>



</div>


</div>



<!-- затемнение -->

<div class="overlay" id="overlay"></div>



<!-- окно памяти -->


<div class="message" id="message">


<h2 id="title"></h2>


<div class="archive">

АРХИВ: OBJECT MEMORY<br>
СЛОЙ: 03<br>
ДОСТУП: ОТКРЫТ

</div>



<p>

ФРАГМЕНТ ПРЕДСКАЗАНИЯ<br>
ИЗ ПАМЯТИ ОБЪЕКТА:<br><br>


<span id="quote"></span>


</p>



<div class="close" onclick="closeMessage()">

ПРЕКРАТИТЬ ДОСТУП

</div>



</div>




<script>


function openObject(title, quote){


document.getElementById("title").innerHTML = title;


document.getElementById("quote").innerHTML = quote;



document.getElementById("overlay").classList.add("active");


document.getElementById("message").classList.add("active");



}




function closeMessage(){


document.getElementById("overlay").classList.remove("active");


document.getElementById("message").classList.remove("active");


}



</script>



</body>

</html>
