<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Слой №3</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#000;
    color:#eee;

    font-family:Consolas, monospace;

    text-align:center;

}


.container{

    padding:30px 15px;

}



h1{

    font-size:34px;
    letter-spacing:5px;

    margin-bottom:25px;

    font-weight:400;

}



.intro{

    color:#aaa;

    line-height:1.8;

    margin-bottom:30px;

}



.picture{

    position:relative;

    width:90%;

    max-width:1000px;

    margin:auto;

}



.picture img{

    width:100%;

    display:block;

}



/* ЗОНЫ КЛИКА - ПОКА ВИДИМЫЕ */

.hotspot{

    position:absolute;

    cursor:pointer;

    border:2px solid red;

    background:rgba(255,0,0,0.15);

}





/* ЛИСА */

.fox{

    left:4%;

    top:13%;

    width:28%;

    height:18%;

}



/* КОСМОНАВТ */

.astronaut{

    left:67%;

    top:7%;

    width:25%;

    height:18%;

}



/* ПИКСЕЛЬНЫЙ ЧЕЛОВЕК */

.digital{

    left:30%;

    top:12%;

    width:28%;

    height:25%;

}



/* ОПЕРАТОР РЕАЛЬНОСТИ */

.operator{

    left:4%;

    top:44%;

    width:25%;

    height:16%;

}



/* ЧЕРЕП */

.skull{

    left:45%;

    top:43%;

    width:23%;

    height:16%;

}



/* TRANSHUMANISM */

.trans{

    left:32%;

    top:56%;

    width:18%;

    height:12%;

}



/* ЗАЯЦ IPHUCK */

.rabbit{

    left:78%;

    top:31%;

    width:20%;

    height:20%;

}



/* КНИГА */

.book{

    left:74%;

    top:48%;

    width:20%;

    height:18%;

}




.message{

    display:none;

    position:fixed;

    left:50%;

    top:50%;

    transform:translate(-50%,-50%);

    background:#050505;

    border:1px solid #555;

    width:90%;

    max-width:500px;

    padding:35px;

    z-index:20;


}



.message h2{

    letter-spacing:3px;

    line-height:1.6;

}



.close{

    margin-top:25px;

    color:#777;

    cursor:pointer;

}



</style>


</head>


<body>


<div class="container">


<h1>

СЛОЙ №3

</h1>



<div class="intro">

НЕ ВСЁ, ЧТО ТЫ ВИДИШЬ,<br>
ЯВЛЯЕТСЯ ПРОСТО РИСУНКОМ.<br><br>

КОСНИСЬ ОДНОГО ИЗ ОБЪЕКТОВ.<br><br>

ОН ГОТОВ ГОВОРИТЬ.

</div>



<div class="picture">


<img src="print.jpg">



<div class="hotspot fox"
onclick="openObject('ОБЪЕКТ №01<br>ЛИСА')">
</div>


<div class="hotspot astronaut"
onclick="openObject('ОБЪЕКТ №02<br>КОСМОНАВТ')">
</div>


<div class="hotspot digital"
onclick="openObject('ОБЪЕКТ №03<br>ВЕРСИЯ ЧЕЛОВЕКА')">
</div>


<div class="hotspot operator"
onclick="openObject('ОБЪЕКТ №04<br>ОПЕРАТОР РЕАЛЬНОСТИ')">
</div>


<div class="hotspot skull"
onclick="openObject('ОБЪЕКТ №05<br>ЧЕРЕП')">
</div>


<div class="hotspot trans"
onclick="openObject('ОБЪЕКТ №06<br>TRANSHUMANISM')">
</div>


<div class="hotspot rabbit"
onclick="openObject('ОБЪЕКТ №07<br>iPhuck 10')">
</div>


<div class="hotspot book"
onclick="openObject('АРТЕФАКТ №08<br>ЧАПАЕВ И ПУСТОТА')">
</div>



</div>


</div>



<div class="message" id="message">


<h2 id="title"></h2>


<br>


<p>

СООБЩЕНИЕ ДЛЯ ТЕБЯ<br>
ИЗ МИРА ОБЪЕКТА:

<br><br>

[ЗДЕСЬ БУДЕТ СООБЩЕНИЕ]

</p>


<div class="close" onclick="closeMessage()">

ЗАКРЫТЬ

</div>


</div>



<script>


function openObject(text){

document.getElementById("title").innerHTML=text;

document.getElementById("message").style.display="block";

}



function closeMessage(){

document.getElementById("message").style.display="none";

}


</script>



</body>

</html>
