<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Слой №3</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#000;
    color:#eee;
    font-family:Consolas, monospace;
    text-align:center;

}


.container{

    padding:30px 15px;

}


h1{

    font-size:34px;
    letter-spacing:5px;
    margin-bottom:25px;
    font-weight:400;

}



.intro{

    color:#aaa;
    line-height:1.8;
    margin-bottom:30px;

}



/* АДАПТИВНЫЙ КОНТЕЙНЕР */

.picture{

    position:relative;

    width:100%;
    max-width:1054px;

    aspect-ratio:1054 / 1492;

    margin:auto;

    overflow:hidden;

}



/* ФИКСИРОВАННЫЙ ХОЛСТ */

.canvas{

    position:absolute;

    width:1054px;
    height:1492px;

    left:0;
    top:0;

    transform-origin:top left;

}



.canvas img{

    position:absolute;

    width:1054px;
    height:1492px;

    left:0;
    top:0;

}



/* ЗОНЫ КЛИКА */

.hotspot{

    position:absolute;

    cursor:pointer;

    border:2px solid red;

    background:rgba(255,0,0,0.15);

}



/* ЛИСА */

.fox{

    left:23px;
    top:211px;

    width:380px;
    height:750px;

}



/* КОСМОНАВТ */

.astronaut{

    left:747px;
    top:157px;

    width:280px;
    height:620px;

}



/* ВЕРСИЯ ЧЕЛОВЕКА */

.digital{

    left:372px;
    top:214px;

    width:400px;
    height:820px;

}



/* ОПЕРАТОР */

.operator{

    left:53px;
    top:977px;

    width:240px;
    height:320px;

}



/* ЧЕРЕП */

.skull{

    left:396px;
    top:1020px;

    width:260px;
    height:340px;

}



/* TRANSHUMANISM */

.trans{

    left:232px;
    top:1271px;

    width:170px;
    height:170px;

}



/* IPHUCK 10 */

.rabbit{

    left:821px;
    top:786px;

    width:180px;
    height:400px;

}



/* КНИГА */

.book{

    left:726px;
    top:1152px;

    width:180px;
    height:340px;

}




.message{

    display:none;

    position:fixed;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    background:#050505;

    border:1px solid #555;

    width:90%;
    max-width:500px;

    padding:35px;

    z-index:20;

}



.message h2{

    letter-spacing:3px;
    line-height:1.6;

}



.close{

    margin-top:25px;
    color:#777;
    cursor:pointer;

}



/* МАСШТАБ ВСЕГО ХОЛСТА НА ТЕЛЕФОНЕ */

@media(max-width:1054px){

.canvas{

    transform:scale(calc(100vw / 1054));

}

}


</style>


</head>


<body>


<div class="container">


<h1>
СЛОЙ №3
</h1>


<div class="intro">

НЕ ВСЁ, ЧТО ТЫ ВИДИШЬ,<br>
ЯВЛЯЕТСЯ ПРОСТО РИСУНКОМ.<br><br>

КОСНИСЬ ОДНОГО ИЗ ОБЪЕКТОВ.<br><br>

ОН ГОТОВ ГОВОРИТЬ.

</div>



<div class="picture">


<div class="canvas">


<img src="print.jpg">



<div class="hotspot fox"
onclick="openObject('ОБЪЕКТ №01<br>ЛИСА')">
</div>


<div class="hotspot astronaut"
onclick="openObject('ОБЪЕКТ №02<br>КОСМОНАВТ')">
</div>


<div class="hotspot digital"
onclick="openObject('ОБЪЕКТ №03<br>ВЕРСИЯ ЧЕЛОВЕКА')">
</div>


<div class="hotspot operator"
onclick="openObject('ОБЪЕКТ №04<br>ОПЕРАТОР РЕАЛЬНОСТИ')">
</div>


<div class="hotspot skull"
onclick="openObject('ОБЪЕКТ №05<br>ЧЕРЕП')">
</div>


<div class="hotspot trans"
onclick="openObject('ОБЪЕКТ №06<br>TRANSHUMANISM')">
</div>


<div class="hotspot rabbit"
onclick="openObject('ОБЪЕКТ №07<br>iPhuck 10')">
</div>


<div class="hotspot book"
onclick="openObject('АРТЕФАКТ №08<br>ЧАПАЕВ И ПУСТОТА')">
</div>



</div>


</div>



</div>




<div class="message" id="message">


<h2 id="title"></h2>


<br>


<p>

СООБЩЕНИЕ ДЛЯ ТЕБЯ<br>
ИЗ МИРА ОБЪЕКТА:

<br><br>

[ЗДЕСЬ БУДЕТ СООБЩЕНИЕ]

</p>



<div class="close" onclick="closeMessage()">

ЗАКРЫТЬ

</div>


</div>



<script>


function openObject(text){

document.getElementById("title").innerHTML=text;

document.getElementById("message").style.display="block";

}



function closeMessage(){

document.getElementById("message").style.display="none";

}


</script>


</body>

</html>
