<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Второй слой</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#000;
    color:#eee;
    font-family:Consolas, monospace;
    overflow:hidden;

}



/* ЗАГРУЗКА */

#boot{

    position:fixed;
    inset:0;

    display:flex;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    background:#000;

}


h1{

    font-size:26px;
    letter-spacing:4px;
    margin-bottom:25px;
    font-weight:400;

}



.bar{

    width:220px;
    height:6px;

    background:#222;

    border-radius:5px;

    overflow:hidden;

}



.progress{

    height:100%;
    width:0%;

    background:#fff;

    animation:load 4s forwards;

}



@keyframes load{

from{

    width:0%;

}

to{

    width:100%;

}

}



#percent{

    margin-top:15px;

    color:#777;

    font-size:12px;

}




/* ОСНОВНАЯ СТРАНИЦА */


#main{

    display:none;

    min-height:100vh;

    width:100vw;


    justify-content:center;

    align-items:center;


    flex-direction:column;


    text-align:center;


    padding:15px;

}




#title{

    font-size:26px;

    letter-spacing:2px;

    margin-bottom:15px;

}




#text{

    max-width:330px;

    color:#aaa;

    line-height:1.4;

    margin-bottom:20px;

    font-size:14px;

}




img{

    max-width:300px;

    width:80%;


    border-radius:0;

    box-shadow:none;


    transition:0.5s;

}




img:hover{

    transform:scale(1.03);

}




.small{

    margin-top:15px;

    color:#666;

    font-size:11px;

    letter-spacing:2px;

}



</style>


</head>


<body>



<div id="boot">


<h1>ИНИЦИАЛИЗАЦИЯ</h1>


<div class="bar">

<div class="progress"></div>

</div>


<div id="percent">

Проверка второго слоя...

</div>


</div>




<div id="main">



<div id="title">

ДОСТУП РАЗРЕШЁН

</div>



<div id="text">


Ты увидел рисунок.

<br><br>

Но некоторые изображения существуют сразу в двух слоях.

<br><br>

Перед тобой первый.

<br>

Второй начинается здесь.


</div>




<img src="print.jpg">





<div class="small">

ОБЪЕКТ FOX-09 АКТИВЕН

</div>




</div>





<script>


setTimeout(function(){


document.getElementById("boot").style.display="none";


document.getElementById("main").style.display="flex";


document.body.style.overflow="auto";


},4000);



</script>



</body>

</html>
